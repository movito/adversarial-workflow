# Pre-commit hooks configuration
# See https://pre-commit.com for more information
#
# Setup: pre-commit install
# Run all: pre-commit run --all-files
# Skip tests: SKIP_TESTS=1 git commit -m "WIP"

repos:
  # General file quality checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: Trim trailing whitespace
      - id: end-of-file-fixer
        name: Fix end of files
      - id: check-yaml
        name: Check YAML syntax
      - id: check-added-large-files
        name: Check for large files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
        name: Check for merge conflicts
      - id: check-toml
        name: Check TOML syntax

  # Python formatting and linting (Ruff replaces Black + isort + flake8)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.7
    hooks:
      - id: ruff
        name: Lint with Ruff
        args: [--fix]
      - id: ruff-format
        name: Format with Ruff

  # Run fast tests before commit (optional - skips if no tests)
  # To skip: SKIP_TESTS=1 git commit -m "WIP"
  - repo: local
    hooks:
      - id: pytest-fast
        name: Run fast tests (pre-commit guard)
        entry: bash -c 'if [ "$SKIP_TESTS" = "1" ]; then echo "Skipping tests (SKIP_TESTS=1)"; exit 0; fi; if [ -d "tests" ] && [ -n "$(find tests -name "test_*.py" 2>/dev/null)" ]; then pytest tests/ -v --tb=short -x -m "not slow" --maxfail=3 || (echo ""; echo "Fast tests failed! Fix before committing or use:"; echo "  SKIP_TESTS=1 git commit -m \"WIP\""; exit 1); else echo "No tests found, skipping"; fi'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]
        verbose: true

      - id: pattern-lint
        name: Defensive coding patterns (DK001-DK004)
        entry: python3 scripts/core/pattern_lint.py adversarial_workflow/ tests/
        language: system
        pass_filenames: false
        types: [python]

      - id: validate-task-status
        name: Validate task status fields
        entry: python3 scripts/core/validate_task_status.py
        language: system
        pass_filenames: false
        always_run: true
